name: Bina APK dengan Notifikasi
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama App'
        required: true
        default: 'Sistem Foto'
      app_url:
        description: 'Link Web (Mesti ada https://)'
        required: true
        default: 'https://utamapress.com.my/hasrul/kad/index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Create Clean Project Files
        run: |
          mkdir -p www && touch www/index.html
          rm -rf android
          echo '{"name": "my-app","version": "1.0.0","dependencies": {"@capacitor/android": "^6.0.0","@capacitor/cli": "^6.0.0","@capacitor/core": "^6.0.0","@capacitor/camera": "^6.0.0","@capacitor/geolocation": "^6.0.0","@capacitor/filesystem": "^6.0.0","@capacitor/push-notifications": "^6.0.0"}}' > package.json
        
      - name: Install Dependencies
        run: npm install --force
          
      - name: Create Fresh Android Project
        run: npx cap add android
      
      - name: Add Firebase Config
        run: |
          # Menyalin fail google-services.json ke dalam folder Android
          if [ -f "resources/google-services.json" ]; then
            mkdir -p android/app
            cp resources/google-services.json android/app/google-services.json
            echo "Fail Firebase berjaya disalin."
          else
            echo "AMARAN: Fail resources/google-services.json tidak dijumpai!"
          fi

      - name: Configure Android & Permissions
        run: |
          node -e "
            const fs = require('fs');
            // Set URL & Name
            const conf = JSON.parse(fs.readFileSync('capacitor.config.json'));
            conf.appName = '${{ github.event.inputs.app_name }}';
            conf.server.url = '${{ github.event.inputs.app_url }}';
            fs.writeFileSync('capacitor.config.json', JSON.stringify(conf, null, 2));
            
            // Tambah kod Push Notification ke MainActivity.java secara automatik
            const manifestPath = 'android/app/src/main/AndroidManifest.xml';
            if (fs.existsSync(manifestPath)) {
              let manifest = fs.readFileSync(manifestPath, 'utf8');
              const permissions = \`
                <uses-permission android:name=\"android.permission.CAMERA\" />
                <uses-permission android:name=\"android.permission.READ_MEDIA_IMAGES\" />
                <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
                <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
                <uses-permission android:name=\"android.permission.INTERNET\" />
                <uses-permission android:name=\"android.permission.WAKE_LOCK\" />
              \`;
              if (!manifest.includes('android.permission.POST_NOTIFICATIONS')) {
                manifest = manifest.replace('<application', permissions + '\n    <application');
                fs.writeFileSync(manifestPath, manifest);
              }
            }
          "
          
      - name: Sync Android
        run: npx cap sync android
        
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Generate APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Firebase-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk