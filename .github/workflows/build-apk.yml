name: Bina APK (Autopilot)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Create Clean Project Files
        run: |
          mkdir -p www && touch www/index.html
          rm -rf android
          echo '{"name": "my-app","version": "1.0.0","dependencies": {"@capacitor/android": "^6.0.0","@capacitor/cli": "^6.0.0","@capacitor/core": "^6.0.0","@capacitor/camera": "^6.0.0","@capacitor/geolocation": "^6.0.0","@capacitor/filesystem": "^6.0.0","@capacitor/push-notifications": "^6.0.0", "@capacitor/splash-screen": "^6.0.0"}}' > package.json
        
      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/assets@latest --save-dev
          
      - name: Create Fresh Android Project
        run: npx cap add android
        
      - name: Generate Icon & Splash
        run: |
          if [ -d "resources" ]; then
            npx @capacitor/assets generate --android || echo "Abaikan ralat aset."
          fi
      
      - name: Read app-settings.json & Configure App
        run: |
          node -e "
            const fs = require('fs');
            
            // 1. Baca fail app-settings.json
            if (!fs.existsSync('app-settings.json')) {
              console.error('RALAT: Fail app-settings.json tidak dijumpai!');
              process.exit(1);
            }
            const settings = JSON.parse(fs.readFileSync('app-settings.json', 'utf8'));
            console.log('Membina Aplikasi: ' + settings.appName + ' (Versi: ' + settings.appVersion + ')');
            
            // 2. Kemaskini capacitor.config.json
            const confPath = 'capacitor.config.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.appId = settings.appId;
            conf.appName = settings.appName;
            conf.server = conf.server || {};
            conf.server.url = settings.appUrl;
            
            conf.plugins = {
              \"SplashScreen\": {
                \"launchShowDuration\": 3000,
                \"launchAutoHide\": true,
                \"backgroundColor\": \"#ffffff\",
                \"androidScaleType\": \"CENTER_CROP\",
                \"showSpinner\": true,
                \"spinnerColor\": \"#000000\"
              }
            };
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2));
            
            // 3. Suntik Versi ke dalam build.gradle Android
            const gradlePath = 'android/app/build.gradle';
            if (fs.existsSync(gradlePath)) {
              let gradle = fs.readFileSync(gradlePath, 'utf8');
              gradle = gradle.replace(/versionCode [0-9]+/, 'versionCode ' + settings.buildNumber);
              gradle = gradle.replace(/versionName \"[^\"]+\"/, 'versionName \"' + settings.appVersion + '\"');
              fs.writeFileSync(gradlePath, gradle);
            }
            
            // 4. Suntik Permissions ke AndroidManifest.xml
            const manifestPath = 'android/app/src/main/AndroidManifest.xml';
            if (fs.existsSync(manifestPath)) {
              let manifest = fs.readFileSync(manifestPath, 'utf8');
              const permissions = \`
                <uses-permission android:name=\"android.permission.CAMERA\" />
                <uses-permission android:name=\"android.permission.READ_MEDIA_IMAGES\" />
                <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
                <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
                <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />
              \`;
              if (!manifest.includes('android.permission.CAMERA')) {
                manifest = manifest.replace('<application', permissions + '\n    <application');
                fs.writeFileSync(manifestPath, manifest);
              }
            }
          "
          
      - name: Sync Android
        run: npx cap sync android
        
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Generate APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon
        
      - name: Get App Name for Artifact
        id: get_name
        run: |
          # Dapatkan nama fail dari app-settings.json untuk menamakan fail .apk yang siap
          APP_NAME=$(node -p "require('./app-settings.json').appName.replace(/\s+/g, '_')")
          echo "apk_name=$APP_NAME" >> $GITHUB_ENV
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.apk_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
